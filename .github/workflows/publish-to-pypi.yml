name: Publish to PyPI

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build flit_core

      - name: Extract version from git tag
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(git describe --tags --always 2>/dev/null || echo "0.0.0.dev$(git rev-parse --short HEAD)")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Update version in pyproject.toml
        run: |
          python -c "
          import re
          with open('pyproject.toml', 'r', encoding='utf-8') as f:
              content = f.read()
          # Update version dynamically
          content = re.sub(r'dynamic = \[\"version\"\]', 'version = \"${{ steps.version.outputs.version }}\"', content)
          with open('pyproject.toml', 'w', encoding='utf-8') as f:
              f.write(content)
          "

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
