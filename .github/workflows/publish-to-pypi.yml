name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional tag to use (e.g., v1.0.0). Include leading v if desired.'
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build flit_core

      - name: Extract version from git tag
        id: version
        env:
          TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -n "$TAG" ]; then
            VERSION=${TAG#v}
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(git describe --tags --always 2>/dev/null || echo "0.0.0.dev$(git rev-parse --short HEAD)")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Update version in source files
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python - <<'PY'
          import os
          v = os.environ.get('VERSION', '0.0.0')

          # Update pyproject.toml: replace dynamic with static version
          with open('pyproject.toml', 'r', encoding='utf-8') as f:
              c = f.read()
          c = c.replace('dynamic = ["version"]', f'version = "{v}"')
          with open('pyproject.toml', 'w', encoding='utf-8') as f:
              f.write(c)

          # Update __init__.py so runtime version matches
          import re
          with open('src/amdl/__init__.py', 'r', encoding='utf-8') as f:
              c = f.read()
          c = re.sub(r'__version__\s*=\s*"[^"]*"', f'__version__ = "{v}"', c)
          with open('src/amdl/__init__.py', 'w', encoding='utf-8') as f:
              f.write(c)

          print(f'Updated version to {v} in pyproject.toml and __init__.py')
          PY

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
